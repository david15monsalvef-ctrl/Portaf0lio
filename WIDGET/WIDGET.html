<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Widget Clima Simple</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #eef2f7;
      text-align: center;
      margin-top: 50px;
    }

    .boton {
      padding: 8px 15px;
      background-color: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      border: 1px solid #2980b9;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      background-color: white;
      border: 1px solid #ccc;
    }

    td {
      padding: 12px;
    }

    .estado {
      font-weight: bold;
    }

    .temperatura {
      font-size: 28px;
      font-weight: bold;
    }

    .icono {
      font-size: 50px;
    }

    .fecha {
      color: #59b5e0;
    }
  </style>
</head>

<body>

<a href="../index.html" class="boton">← Volver</a>

<table>
  <tr>
    <td class="estado">Soleado</td>
    <td rowspan="3" class="icono">☀️</td>
  </tr>
  <tr>
    <td class="temperatura">27°</td>
  </tr>
  <tr>
    <td class="fecha">Domingo, 12 Julio</td>
  </tr>
</table>

</body>
</html>
