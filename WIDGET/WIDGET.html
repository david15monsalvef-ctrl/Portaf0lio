<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Clima Bogotá</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #eef2f7;
      text-align: center;
      margin-top: 50px;
    }

    .boton {
      padding: 8px 15px;
      background-color: #3498db;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      border: 1px solid #2980b9;
    }

    table {
      margin: 30px auto;
      border-collapse: collapse;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
      padding: 15px;
    }

    td {
      padding: 10px 20px;
    }

    .ciudad {
      font-size: 20px;
      font-weight: bold;
      color: #2c3e50;
    }

    .estado {
      font-weight: bold;
      color: #555;
    }

    .temperatura {
      font-size: 35px;
      font-weight: bold;
      color: #e67e22;
    }

    .icono {
      font-size: 60px;
    }

    .fecha {
      color: #59b5e0;
      font-size: 14px;
    }
  </style>
</head>

<body>

<a href="../index.html" class="boton">← Volver</a>

<table>
  <tr>
    <td colspan="2" class="ciudad">Bogotá</td>
  </tr>
  <tr>
    <td class="estado">Soleado</td>
    <td rowspan="3" class="icono">☀️</td>
  </tr>
  <tr>
    <td class="temperatura">27°</td>
  </tr>
  <tr>
    <td class="fecha">Domingo, 12 Julio</td>
  </tr>
</table>

</body>
