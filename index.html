  /* Bienvenida */
  .bienvenida {
    max-width: 600px;
    margin: 0 auto 50px auto;
    background: #ffffff;
    border-radius: 16px;

    font-weight: normal;
  }

  .button-container {
    gap: 30px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .btn {
    background: #3a8cd4;
    color: #fff;
    text-decoration: none;
    border-radius: 16px;
    width: 200px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    padding-bottom: 10px;
    margin: 20px;
    
  }

  .btn img {
    width: 100%;
    height: 140px;
    object-fit: cover;
    border-top-left-radius: 16px;
    border-top-right-radius: 16px;
  }

  .btn p {
    margin: 15px 0;
    font-weight: bold;
    font-size: 1.1em;
  }

  .btn:hover {
    background: #2b6cb0;
    transform: scale(1.05);
  }

  .btn:hover img {
    transform: scale(1.1);
  }

  a.btn {
    vertical-align: top;
    display: inline-block; 
  }
</style>
